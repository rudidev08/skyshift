<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#050709" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Skyshift" />
    <meta
      name="description"
      content="A self-running 2D space economy for your browser. Five nations trade, build, and emigrate while ships keep stations supplied."
    />
    <title>Skyshift</title>
    <!-- Open Graph — how the link unfurls when shared (iMessage, Slack, Discord, Facebook, etc.). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Skyshift" />
    <meta property="og:title" content="Skyshift" />
    <meta property="og:description" content="A self-running 2D space economy for your browser. Five nations trade, build, and emigrate while ships keep stations supplied." />
    <meta property="og:url" content="https://skyshift.rudidev.com/" />
    <meta property="og:image" content="https://skyshift.rudidev.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Skyshift — five nations trade, build, and emigrate across a cluster of space stations" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/ui.css" />
    <style>
      /* Override ui.css body — landing page has its own column layout
         and doesn't want the global 120px footer pad. overflow-x: clip
         (not hidden) keeps iOS inertial scroll on <html> intact. */
      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: var(--ink-deep);
        color: #e5ecff;
        font-family: system-ui, sans-serif;
        overflow-x: clip;
        padding-bottom: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="bg"></canvas>

    <div class="landing-page">
      <div class="landing-title-area">
        <h1 class="landing-hero">Skyshift</h1>
        <div class="landing-caption">
          <div>// FIVE NATIONS <b>TRADE · BUILD · EMIGRATE</b></div>
          <div class="codes">
            <span style="color: var(--nation-bio)">BIO</span>
            <span class="sep">·</span>
            <span style="color: var(--nation-hub)">HUB</span>
            <span class="sep">·</span>
            <span style="color: var(--nation-ore)">ORE</span>
            <span class="sep">·</span>
            <span style="color: var(--nation-sky)">SKY</span>
            <span class="sep">·</span>
            <span style="color: var(--nation-far)">FAR</span>
          </div>
        </div>
      </div>

      <div class="landing-sector-area">
        <canvas id="sector"></canvas>
      </div>

      <!-- Populated by the script below based on save-state: either two
           Enter-universe buttons (first visit) or one Continue over two
           smaller "Start new <map> universe" siblings (returning). -->
      <div class="start-actions" data-role="start-actions"></div>

      <nav class="landing-nav">
        <div class="landing-nav-primary">
          <a href="/help.html">// <span class="num">01</span> Orientation</a>
          <a href="/lore.html">// <span class="num">02</span> Lore</a>
        </div>
        <div class="landing-nav-secondary">
          <a href="/design.html">// UI Design</a>
          <a href="/tools.html">// Tools</a>
          <a href="https://github.com/rudidev08/skyshift">// GitHub</a>
        </div>
      </nav>
    </div>

    <script type="module" src="/src/static-pages/landing-entry.ts"></script>
  </body>
</html>

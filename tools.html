<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#050709" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Skyshift" />
    <meta
      name="description"
      content="The Skyshift editor: shape the map, stations, and economy. Run timelapse simulation up to 20 days."
    />
    <title>Skyshift: Tools</title>
    <!-- Open Graph — how the link unfurls when shared (iMessage, Slack, Discord, Facebook, etc.). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Skyshift" />
    <meta property="og:title" content="Skyshift: Tools" />
    <meta property="og:description" content="The Skyshift editor: shape the map, stations, and economy. Run timelapse simulation up to 20 days." />
    <meta property="og:url" content="https://skyshift.rudidev.com/tools.html" />
    <meta property="og:image" content="https://skyshift.rudidev.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Skyshift — five nations trade, build, and emigrate across a cluster of space stations" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/ui.css" />
    <link rel="stylesheet" href="/ui-tools.css" />
  </head>
  <body>
    <div class="editor-shell">
      <div id="readonly-banner" class="readonly-banner" role="status">
        <span class="readonly-banner-label">Read-Only</span>
        <span>Feel free to explore.</span>
      </div>
      <a class="page-masthead-back" href="/">«<span class="num">00</span>Index</a>
      <div class="editor-tabs" role="tablist" aria-label="Editor views">
        <button
          id="timelapse-editor-tab"
          class="editor-tab is-active"
          data-editor-tab="timelapse"
          role="tab"
          aria-selected="true"
          aria-controls="timelapse-editor-view"
        >
          Timelapse
        </button>
        <button
          id="map-editor-tab"
          class="editor-tab"
          data-editor-tab="map"
          role="tab"
          aria-selected="false"
          aria-controls="map-editor-view"
        >
          Map Editor
        </button>
        <button
          id="economy-editor-tab"
          class="editor-tab"
          data-editor-tab="economy"
          role="tab"
          aria-selected="false"
          aria-controls="economy-editor-view"
        >
          Economy Editor
        </button>
      </div>

      <section
        id="map-editor-view"
        class="editor-view"
        role="tabpanel"
        aria-labelledby="map-editor-tab"
        hidden
      >
        <div class="map-editor-toolbar">
          <div class="map-editor-mode-stack">
            <div class="map-editor-mode-group" role="toolbar" aria-label="Map editor modes">
              <button id="map-mode-view" class="map-editor-mode-button is-active" data-map-mode="view">
                View
              </button>
              <button id="map-mode-select" class="map-editor-mode-button" data-map-mode="select">
                Select
              </button>
              <button
                id="map-mode-move"
                class="map-editor-mode-button"
                data-map-mode="move"
                title="Move stations, nebulas, and zones"
              >
                Move
              </button>
            </div>
            <label
              class="map-editor-preset"
              title="Seeds the editor with the chosen preset — switching discards in-editor edits."
            >
              Preset
              <select data-role="preset-picker" class="map-editor-preset-select"></select>
            </label>
          </div>
          <div id="map-editor-status-text" class="map-editor-status"></div>
        </div>
        <div class="map-editor-surface">
          <div id="game-container"></div>
          <!-- Speed HUD — mirrors universe.html so shared boot code can run unchanged.
             The element stays hidden; editor mode skips setupGameplaySpeedAndTimeHud
             (game.ts) and owns sim-speed through its own toolbar controls. -->
          <div id="speed-hud" class="speed-hud" hidden>
            <div id="speed-hud-elapsed" class="speed-hud__elapsed">
              // elapsed <span class="num">00m:00s</span>
            </div>
            <div class="speed-hud__row">
              <button id="speed-pause-btn" class="speed-pill speed-pill--icon" type="button" title="Pause">
                <span class="speed-pill__icon"></span>
              </button>
              <button
                id="speed-cycle-btn"
                class="speed-pill speed-pill--cycle"
                type="button"
                title="Cycle speed"
              >
                <span class="speed-pill__icon"></span>
                <span class="speed-pill__text">1×</span>
              </button>
            </div>
          </div>
          <div id="hud-bar">
            <div class="zoom-dial">
              <div id="controls-toggle" class="zoom-btn" title="Toggle controls"></div>
              <div class="zoom-group">
                <div id="zoom-out" class="zoom-btn" title="Zoom out"></div>
                <div id="zoom-level" class="zoom-level" title="Cycle zoom preset"></div>
                <div id="zoom-in" class="zoom-btn" title="Zoom in"></div>
              </div>
            </div>
            <!-- Editor HUD keeps only the zones toggle. universe.html also has an
               overview toggle here, plus a settings gear that game-entry-hud.ts
               appends at boot — neither belongs in the editor. -->
            <div id="hud-top-row" class="row gap-xs">
              <button id="zones-toggle" class="hud-btn hud-btn-icon" title="Zones"></button>
            </div>
          </div>
          <!-- Selection dossier — mirrors universe.html so game-setup.ts's
             getElementById bindings resolve in editor mode (the dossier IDs
             below are non-null assertions in game-setup.ts). -->
          <div id="overlay-info">
            <div id="overlay-info-row">
              <div id="overlay-info-card" class="id-card">
                <div class="id-header">
                  <div class="id-title">
                    <div id="selected-object" class="id-name"></div>
                    <div id="selected-type" class="id-type"></div>
                  </div>
                  <div class="icon-code">
                    <div id="hud-seal" class="id-seal"></div>
                    <div id="serial-code" class="id-serial-code id-serial-code--stamp"></div>
                  </div>
                </div>
                <div id="description" class="cargo-grid"></div>
                <div id="status-band" class="section-band id-status-band" hidden></div>
              </div>
              <!-- Info rail toggles — game-entry-hud.ts binds collapse/lore/log
                 by ID. Editor mode hides the collapse toggle (showInfoCardForEditor)
                 and ui-tools.css hides the lore/log buttons under .map-editor-surface. -->
              <div id="info-rail">
                <button id="collapse-toggle" class="hud-btn hud-btn-icon" title="Collapse"></button>
                <button id="lore-toggle" class="hud-btn hud-btn-icon" title="Lore"></button>
                <button id="log-toggle" class="hud-btn hud-btn-icon" title="Trade log"></button>
              </div>
            </div>
          </div>
          <!-- Hidden legacy hud-icon — visible variant moved to #hud-seal in the
             id-card header. game-setup.ts still binds #hud-icon with a non-null
             assertion, so the element has to stay in the tree. -->
          <img id="hud-icon" hidden />
          <!-- Lore / log drawers — gameplay chrome. Hidden in the editor
             but the IDs (#lore-box, #lore, #lore-title, #log-box,
             #log-content) are required by game-setup.ts bindings. -->
          <div id="lore-box">
            <div class="lore-card">
              <div id="lore-title" class="lore-title"></div>
              <div id="lore" class="lore-text"></div>
            </div>
          </div>
          <div id="log-box">
            <div class="log-panel">
              <div id="log-content" class="log-panel-body"></div>
            </div>
          </div>
        </div>
      </section>

      <section
        id="economy-editor-view"
        class="editor-view"
        role="tabpanel"
        aria-labelledby="economy-editor-tab"
        hidden
      >
        <div id="app"></div>
      </section>

      <section
        id="timelapse-editor-view"
        class="editor-view is-active"
        role="tabpanel"
        aria-labelledby="timelapse-editor-tab"
      >
        <div class="map-editor-toolbar timelapse-toolbar">
          <label class="map-editor-preset" title="Universe map to seed the simulation.">
            Map
            <select id="timelapse-preset" class="map-editor-preset-select"></select>
          </label>
          <label class="map-editor-preset" title="How much sim time to fast-forward.">
            Duration
            <select id="timelapse-duration" class="map-editor-preset-select">
              <option value="259200" selected>3d</option>
              <option value="604800">7d</option>
              <option value="1728000">20d</option>
            </select>
          </label>
          <label
            class="map-editor-preset"
            title="Fraction of eligible stations that emigrate during the run."
          >
            Stations to emigrate
            <select id="timelapse-emigration-share" class="map-editor-preset-select">
              <option value="none">None</option>
              <option value="low">25%</option>
              <option value="medium" selected>50%</option>
              <option value="high">75%</option>
            </select>
          </label>
          <button id="timelapse-run" class="button-primary" type="button">Run</button>
          <button id="timelapse-pause" class="hud-btn" type="button" hidden>Pause</button>
          <button
            id="timelapse-diagnostics"
            class="hud-btn"
            type="button"
            hidden
            title="Download the captured frames as JSON for debugging."
          >
            <span>Diagnostics</span>
          </button>
          <button
            id="timelapse-reset"
            class="hud-btn"
            type="button"
            hidden
            title="Clear the captured run and re-show the Run button."
          >
            Reset
          </button>
        </div>
        <div class="timelapse-step-bar" role="toolbar" aria-label="Timelapse playback controls">
          <div class="timelapse-status-stack">
            <div class="timelapse-time-row">
              <span id="timelapse-time" class="timelapse-time"></span>
              <div id="timelapse-progress" class="cargo-track timelapse-progress" hidden>
                <div id="timelapse-progress-fill" class="cargo-fill"></div>
              </div>
            </div>
            <div id="timelapse-control-mount" hidden></div>
          </div>
        </div>
        <div class="map-editor-surface timelapse-surface">
          <div id="timelapse-container"></div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/editor/index.ts"></script>
  </body>
</html>
